version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: solotrack-backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    env_file:
      - ./Backend/.env
    depends_on:
      - db
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:20-alpine
    container_name: solotrack-frontend
    working_dir: /app
    volumes:
      - ./Frontend:/app
      # Arquivos para o docker
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  db:
    image: mysql:8.0
    container_name: solotrack-db
    restart: always
    ports:
      - "3307:3306"
    env_file:
      - ./Backend/.env
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  frontend_node_modules:
